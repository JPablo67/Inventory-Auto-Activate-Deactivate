services:
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: always
    environment:
      POSTGRES_USER: inventory_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory_deactivator
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_app -d inventory_deactivator"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: inventory-deactivator
    build: .
    restart: always
    ports:
      - "4500:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: inventory-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

volumes:
  pgdata:
  pgadmin_data:
